<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Title Bar -->
  <header class="titlebar">
    <div class="titlebar-drag">
      <span class="titlebar-title">Quick <span>Tasks</span></span>
    </div>
    <button class="titlebar-btn" id="closeBtn" title="Hide">
      <svg width="12" height="12" viewBox="0 0 14 14" fill="none">
        <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
      </svg>
    </button>
  </header>

  <!-- Input -->
  <div class="input-section">
    <div class="input-row">
      <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off" maxlength="200">
      <button class="input-add-btn" id="addNoDeadline" title="Add task">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        </svg>
      </button>
    </div>
    <div class="quick-actions">
      <button class="chip chip-deadline" data-days="1">1 Day</button>
      <button class="chip chip-deadline" data-days="3">3 Days</button>
      <button class="chip chip-deadline" data-days="7">7 Days</button>
      <button class="chip chip-deadline" data-days="14">14 Days</button>
      <button class="chip chip-deadline" data-days="30">1 Month</button>
      <button class="chip chip-deadline chip-custom" id="customDeadlineBtn">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 6v6l4 2" />
        </svg>
        Pick
      </button>
    </div>
  </div>

  <!-- Custom Date Picker -->
  <div class="picker-overlay hidden" id="pickerOverlay">
    <div class="picker-modal">
      <div class="picker-header">
        <button class="picker-nav" id="prevMonth">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M7 1L3 5L7 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
        <span class="picker-month" id="pickerMonth"></span>
        <button class="picker-nav" id="nextMonth">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
            <path d="M3 1L7 5L3 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
      </div>
      <div class="picker-weekdays">
        <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
      </div>
      <div class="picker-days" id="pickerDays"></div>
      <div class="picker-time">
        <label class="picker-time-label">Time</label>
        <div class="picker-time-inputs">
          <input type="number" id="pickerHour" class="picker-time-field" min="0" max="23" value="12" />
          <span class="picker-time-sep">:</span>
          <input type="number" id="pickerMinute" class="picker-time-field" min="0" max="59" value="00" step="5" />
        </div>
      </div>
      <div class="picker-actions">
        <button class="picker-btn picker-cancel" id="pickerCancel">Cancel</button>
        <button class="picker-btn picker-confirm" id="pickerConfirm">Set Deadline</button>
      </div>
    </div>
  </div>

  <!-- Stats -->
  <div class="task-meta">
    <span id="taskCount">No tasks</span>
    <button class="meta-btn" id="clearDoneBtn">Clear done</button>
  </div>

  <!-- Tasks -->
  <div class="task-list" id="taskList">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
          stroke-linecap="round">
          <path d="M9 11l3 3L22 4" />
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
        </svg>
      </div>
      <p>No tasks yet — type above to start</p>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <kbd>Ctrl+Shift+Space</kbd> <span>to toggle</span>
  </div>

  <script src="app.js"></script>
</body>

</html>
